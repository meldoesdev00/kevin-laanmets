name: Sync listings

on:
  schedule:
    # Runs every day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Sync listings from kv.ee
        run: npm run sync-listings
        env:
          CI: "true"

      - name: Commit updated listings if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          if git diff --cached --quiet; then
            echo "No listing changes — nothing to commit."
          else
            git commit -m "chore: sync listings from kv.ee"
            git push
          fi
